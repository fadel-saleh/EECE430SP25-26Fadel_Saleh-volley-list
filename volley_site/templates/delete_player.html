<!DOCTYPE html>
<html>
<head><title>Delete Player</title></head>
<body>
    <h1>Delete Player</h1>
    <p>Are you sure you want to delete {{ player.name }}?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    <a href="{% url 'player_list' %}">Cancel</a>
</body>
</html>
