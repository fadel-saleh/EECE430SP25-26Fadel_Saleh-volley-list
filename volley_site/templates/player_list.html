<!DOCTYPE html>
<html>
    <head><title>Player List</title></head>
    <h1>Player Database</h1>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'add_player' %}">Add Player</a>
    <table border="1" cellpadding="8">
        <tr>
            <th>ID</th><th>Name</th><th>Date Joined</th><th>Position</th>
            <th>Salary</th><th>Contact Person</th><th>Actions</th>
        </tr>
        {% for player in players %}
        <tr>
            <td>{{ player.id }}</td>
            <td>{{ player.name }}</td>
            <td>{{ player.date_joined }}</td>
            <td>{{ player.position }}</td>
            <td>{{ player.salary }}</td>
            <td>{{ player.contact_person }}</td>
            <td>
                <a href="{% url 'update_player' player.id %}">Update</a>
                <a href="{% url 'delete_player' player.id %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
